<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS SHOP — Gaming Gear</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="logo.jpg.jpg" type="image/jpg.jpg" sizes="16x16">
</head>
<body>


<header class="site-header">

    <div class="site-header__inner">
        <a href="index.html" class="logo">NEXUS<span>SHOP</span></a>
        <nav class="nav">
            <a href="index.html"     class="nav__link nav__link--active">Catalog</a>
            <a href="cart.html"      class="nav__link cart-badge">🛒 товары  <span id="cart-count">0</span></a>
            <a href="moderator.html" class="nav__link">⚙ Moderator</a>
            <a href="register.html" class="nav__link">👤 Register</a>

        </nav>
    </div>
</header>


<section class="page-hero">
    <h1 class="page-hero__title">Gaming <span>Gear</span> Store</h1>
    <p class="page-hero__sub">лучшие товары по лучшим ценаm :)</p>
</section>


<div class="filters container">
    <input
            type="search"
            id="search"
            class="search-input"
            placeholder="🔍 Search products…"
            aria-label="Search products"
    >
    <select id="filter-category" class="filter-select" aria-label="Filter by category">
        <option value="">All Categories</option>
        <option value="Headsets">Headsets</option>
        <option value="Mice">Mice</option>
        <option value="Keyboards">Keyboards</option>
        <option value="Monitors">Monitors</option>
    </select>
    <select id="filter-sort" class="filter-select" aria-label="Sort products">
        <option value="">Sort: Default</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="rating">Top Rated</option>
    </select>
</div>


<main class="product-grid" id="product-grid">

</main>


<footer class="site-footer">
    <p>© 2025 NexusShop — All rights reserved(NO)</p>
</footer>


<script src="js/Product.js"></script>
<script src="js/Cart.js"></script>
<script src="js/Api.js"></script>
<script src="js/Validator.js"></script>
<script src="js/app.js"></script>
</body>
</html>
